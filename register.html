<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - QuantDash</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <div class="register-container">
        <div class="register-left">
            <div class="brand-section">
                <div class="logo-icon-large">
                    <span class="q-letter">Q</span>
                    <div class="logo-pulse"></div>
                </div>
                <h1>QuantDash</h1>
                <p class="tagline">Real-Time Trading Intelligence</p>
            </div>
            <div class="features">
                <div class="feature">
                    <i class="fas fa-rocket"></i>
                    <span>Get Started in Minutes</span>
                </div>
                <div class="feature">
                    <i class="fas fa-chart-bar"></i>
                    <span>Track Multiple Stocks</span>
                </div>
                <div class="feature">
                    <i class="fas fa-bell"></i>
                    <span>Real-Time Alerts</span>
                </div>
            </div>
        </div>

        <div class="register-right">
            <div class="register-box">
                <h2>Create Account</h2>
                <p class="subtitle">Start your trading journey today</p>

                <form id="registerForm" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="fullName">
                            <i class="fas fa-user"></i>
                            Full Name
                        </label>
                        <input type="text" id="fullName" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">
                            <i class="fas fa-envelope"></i>
                            Email Address
                        </label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i>
                            Password
                        </label>
                        <input type="password" id="password" placeholder="Create a password" required minlength="6">
                        <small class="password-hint">At least 6 characters</small>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">
                            <i class="fas fa-lock"></i>
                            Confirm Password
                        </label>
                        <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" id="agreeTerms" required>
                            <span class="checkmark"></span>
                            I agree to the <a href="#">Terms & Conditions</a>
                        </label>
                    </div>

                    <button type="submit" class="btn-register">
                        <i class="fas fa-user-plus"></i>
                        Create Account
                    </button>
                </form>

                <div class="divider">
                    <span>OR</span>
                </div>

                <button class="btn-google">
                    <i class="fab fa-google"></i>
                    Sign up with Google
                </button>

                <p class="login-link">
                    Already have an account? 
                    <a href="login.html">Login here</a>
                </p>
            </div>
        </div>
    </div>

    <script src="./auth.js"></script>
</body>
</html>
