<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantDash - Stock Details</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
                <div class="time" id="currentTime"></div>
            </div>
        </header>

        <div class="detail-hero">
            <div class="company-header">
                <img id="companyLogo" src="" alt="Company Logo" class="company-logo-large">
                <div class="company-info">
                    <h1 id="companyName">Loading...</h1>
                    <p id="companySymbol" class="symbol-text">---</p>
                </div>
            </div>
            <div class="price-info">
                <div class="current-price" id="currentPrice">$0.00</div>
                <div class="price-change-detail" id="priceChange">
                    <i class="fas fa-arrow-up"></i> +0.00%
                </div>
            </div>
        </div>

        <div class="stats-grid detail-stats">
            <div class="stat-card">
                <div class="stat-label">Open</div>
                <div class="stat-value" id="openPrice">$0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">High</div>
                <div class="stat-value" id="highPrice">$0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Low</div>
                <div class="stat-value" id="lowPrice">$0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Volume</div>
                <div class="stat-value" id="volumeDetail">0M</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Market Cap</div>
                <div class="stat-value" id="marketCapDetail">$0B</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">P/E Ratio</div>
                <div class="stat-value" id="peRatio">0.00</div>
            </div>
        </div>

        <div class="chart-section">
            <div class="chart-header">
                <h2><i class="fas fa-chart-area"></i> Price Chart (Candlestick)</h2>
                <div class="chart-controls">
                    <button class="time-btn active" data-range="1D">1D</button>
                    <button class="time-btn" data-range="1W">1W</button>
                    <button class="time-btn" data-range="1M">1M</button>
                    <button class="time-btn" data-range="3M">3M</button>
                    <button class="time-btn" data-range="1Y">1Y</button>
                </div>
            </div>
            <div class="candlestick-chart" id="candlestickChart"></div>
        </div>

        <div class="chart-section">
            <h2><i class="fas fa-chart-bar"></i> Volume Analysis</h2>
            <div class="volume-chart" id="volumeChartContainer"></div>
        </div>

        <div class="info-grid">
            <div class="info-card">
                <h3><i class="fas fa-info-circle"></i> Company Overview</h3>
                <p id="companyDescription">Loading company information...</p>
            </div>
            <div class="info-card">
                <h3><i class="fas fa-building"></i> Key Statistics</h3>
                <div class="key-stats">
                    <div class="stat-row">
                        <span>52 Week High:</span>
                        <strong id="week52High">$0.00</strong>
                    </div>
                    <div class="stat-row">
                        <span>52 Week Low:</span>
                        <strong id="week52Low">$0.00</strong>
                    </div>
                    <div class="stat-row">
                        <span>Avg Volume:</span>
                        <strong id="avgVolume">0M</strong>
                    </div>
                    <div class="stat-row">
                        <span>Beta:</span>
                        <strong id="beta">0.00</strong>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="stock-detail.js"></script>
</body>
</html>
